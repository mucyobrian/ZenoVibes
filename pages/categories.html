<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Categories — StillWorks</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <style>
    /* ── Category card ── */
    .cat-card-img {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      border-radius: 0;
      margin-bottom: 0;
      display: block;
    }
    .cat-card-emoji-fallback {
      width: 100%;
      aspect-ratio: 4/5;
      border-radius: 0;
      margin-bottom: 0;
      background: var(--surface-2, #f0f0f0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-muted, #888);
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88rem;
      color: var(--text-muted, #888);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .breadcrumb a {
      color: var(--accent, #f5a623);
      text-decoration: none;
      font-weight: 500;
    }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .sep { opacity: 0.5; }

    /* ── Section header ── */
    .subcat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .subcat-header h2 {
      margin: 0;
      font-size: 1.4rem;
    }
    .subcat-header .count-badge {
      background: var(--surface-2, #f0f0f0);
      color: var(--text-muted, #888);
      font-size: 0.8rem;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ── Subcategory grid ── */
    .subcat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 40px;
    }
    .subcat-card {
      background: var(--surface, #fff);
      border: 1.5px solid var(--border, #eee);
      border-radius: 12px;
      padding: 0;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      text-decoration: none;
      color: inherit;
      display: block;
      overflow: hidden;
    }
    .subcat-card:hover {
      border-color: var(--accent, #f5a623);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .subcat-card .subcat-card-body {
      padding: 10px 10px 12px;
    }
    .subcat-card .subcat-name {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .subcat-card .subcat-count {
      font-size: 0.78rem;
      color: var(--text-muted, #888);
    }
    .subcat-card-img {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      border-radius: 0;
      display: block;
    }
    .subcat-card-emoji-fallback {
      width: 100%;
      aspect-ratio: 4/5;
      border-radius: 0;
      background: var(--surface-2, #f0f0f0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--text-muted, #888);
    }

    /* ── "All in category" shortcut ── */
    .view-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
      padding: 8px 16px;
      background: var(--surface-2, #f4f4f4);
      border: 1.5px solid var(--border, #eee);
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--text, #222);
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .view-all-btn:hover { border-color: var(--accent, #f5a623); }
  </style>
</head>

  <div id="viewAllCats">
    <div class="cat-grid" id="catGrid"></div>

  <!-- ② SUBCATEGORIES VIEW -->
  <div id="viewSubcats" style="display:none">

<script src="../js/app.js"></script>
<script>
let allProducts = [];
let currentCatId = null;

// ── Helpers ──────────────────────────────────────
// store subcat list outside the DOM so it survives innerHTML rewrites
let _subcatList = [];

function showView(name) {
  ['viewAllCats','viewSubcats','viewProducts'].forEach(id => {
    document.getElementById(id).style.display = id === name ? 'block' : 'none';
  });
}

function setHero(title) {
  document.getElementById('pageHeroTitle').textContent = title;
}

function catLabel(catId) {
  return CONFIG.CATEGORIES.find(c => c.id === catId)?.label || catId;
}

// ── INIT ─────────────────────────────────────────
async function initCategories() {
  allProducts = await DB.getProducts();

  // merge any unsynced local listings
  const liveNames = new Set(allProducts.map(p => p.productName));
  const localOnly  = JSON.parse(localStorage.getItem('sokohub_my_listings') || '[]')
    .filter(p => String(p.id).startsWith('local_') && !liveNames.has(p.productName));
  if (localOnly.length) allProducts = [...localOnly, ...allProducts];

  buildCatGrid();

  // deep-link support: ?cat=electronics or ?cat=electronics&sub=Laptops
  const params = new URLSearchParams(window.location.search);
  const cat    = params.get('cat');
  const sub    = params.get('sub');
  if (cat && sub) {
    showCatProducts(cat, sub);
  } else if (cat) {
    showSubcats(cat);
  }
}

// ── VIEW 1 — All categories ──────────────────────
function buildCatGrid() {
  const grid   = document.getElementById('catGrid');
  const counts = {};
  allProducts.forEach(p => { counts[p.category] = (counts[p.category] || 0) + 1; });

  grid.innerHTML = CONFIG.CATEGORIES.filter(c => c.id !== 'all').map(cat => `
    <a class="cat-card" onclick="showSubcats('${cat.id}')" href="#">
      <img class="cat-card-img" src="${cat.image}" alt="${cat.label}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <span class="cat-card-emoji-fallback" style="display:none">${cat.id.charAt(0).toUpperCase()}</span>
      <div class="cat-card-body">
        <h3>${cat.label}</h3>
        <span>${counts[cat.id] || 0} product${(counts[cat.id] || 0) !== 1 ? 's' : ''}</span>
      </div>
    </a>`).join('');
}

// ── VIEW 2 — Subcategories ───────────────────────
function showSubcats(catId) {
  currentCatId = catId;
  const label    = catLabel(catId);
  const subcats  = CONFIG.SUBCATEGORIES[catId] || [];
  const products = allProducts.filter(p => p.category === catId);

  // count per subcat
  const counts = {};
  products.forEach(p => {
    const s = p.subcategory || 'Other';
    counts[s] = (counts[s] || 0) + 1;
  });

  // breadcrumb
  document.getElementById('subcatBreadcrumb').innerHTML =
    `<a href="#" onclick="goAllCats()">All Categories</a>
     <span class="sep">›</span>
     <span>${label}</span>`;

  document.getElementById('subcatTitle').textContent       = label;
  document.getElementById('subcatTotalCount').textContent  = `${products.length} product${products.length !== 1 ? 's' : ''}`;
  document.getElementById('viewAllLabel').textContent      = label;

  // build subcat cards — show all defined subcats, plus any "Other" that have products
  const toShow = subcats.length
    ? subcats
    : [...new Set(products.map(p => p.subcategory || 'Other'))];

  const subcatGridEl = document.getElementById('subcatGrid');
  subcatGridEl.innerHTML = toShow.map((sub, i) => {
    const n = counts[sub] || 0;
    return `
      <a class="subcat-card" href="#" data-catid="${catId}" data-subcat-index="${i}">
        <img class="subcat-card-img" src="${getSubcatImage(catId, sub)}" alt="${escHtml(sub)}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <span class="subcat-card-emoji-fallback" style="display:none">${getSubcatEmoji(catId, sub)}</span>
        <div class="subcat-card-body">
          <div class="subcat-name">${escHtml(sub)}</div>
          <div class="subcat-count">${n} item${n !== 1 ? 's' : ''}</div>
        </div>
      </a>`;
  }).join('');

  // store subcat names at module level so they survive innerHTML rewrites
  _subcatList = toShow;

  subcatGridEl.onclick = function(e) {
    const card = e.target.closest('.subcat-card');
    if (!card) return;
    e.preventDefault();
    const idx = parseInt(card.dataset.subcatIndex, 10);
    const sub = _subcatList[idx];
    showCatProducts(card.dataset.catid, sub);
  };

  setHero(`${label}`, 'Choose a subcategory');
  showView('viewSubcats');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── VIEW 3 — Products ────────────────────────────
function showCatProducts(catId, subcatName) {
  currentCatId = catId;
  const catLbl  = catLabel(catId);
  const filtered = subcatName
    ? allProducts.filter(p => p.category === catId && (p.subcategory || 'Other') === subcatName)
    : allProducts.filter(p => p.category === catId);
  // ^ subcatName falsy (null/'') means show all in category

  const title = subcatName ? `${subcatName}` : catLbl;

  // breadcrumb
  const breadcrumb = document.getElementById('productsBreadcrumb');
  if (subcatName) {
    breadcrumb.innerHTML =
      `<a href="#" onclick="goAllCats()">All Categories</a>
       <span class="sep">›</span>
       <a href="#" onclick="showSubcats('${catId}')">${catLbl}</a>
       <span class="sep">›</span>
       <span>${subcatName}</span>`;
  } else {
    breadcrumb.innerHTML =
      `<a href="#" onclick="goAllCats()">All Categories</a>
       <span class="sep">›</span>
       <span>${catLbl}</span>`;
  }

  document.getElementById('productsTitle').textContent     = title;
  document.getElementById('productsTotalCount').textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;

  const grid  = document.getElementById('catProductsGrid');
  const noRes = document.getElementById('catNoResults');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noRes.classList.remove('hidden');
  } else {
    noRes.classList.add('hidden');
    grid.innerHTML = filtered.map(p => buildProductCard(p)).join('');
  }

  setHero(title, subcatName ? `${catLbl} › ${subcatName}` : catLbl);
  showView('viewProducts');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Navigation helpers ───────────────────────────
function goAllCats() {
  currentCatId = null;
  setHero('📦 All Categories', 'Browse products by category — find exactly what you need');
  showView('viewAllCats');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Legacy: called from URL deep-link ?cat= only
function closeCatProducts() { goAllCats(); }

document.addEventListener('DOMContentLoaded', initCategories);
</script>
